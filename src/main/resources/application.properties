spring.application.name=loyalty-tier-system

# Server Configuration
server.port=${SERVER_PORT:8080}

# Database Configuration (PostgreSQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=${DB_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${DB_FORMAT_SQL:true}

# Neon/Postgres specific settings
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=${DB_LOB_NON_CONTEXTUAL_CREATION:true}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}

# Seeding Configuration
GLOBAL_SEED_ENABLED=${GLOBAL_SEED_ENABLED:false}
USER_SEED_ENABLED=${USER_SEED_ENABLED:false}
TIER_SEED_ENABLED=${TIER_SEED_ENABLED:false}
PLAN_SEED_ENABLED=${PLAN_SEED_ENABLED:false}
BENEFIT_SEED_ENABLED=${BENEFIT_SEED_ENABLED:false}
TIER_CRITERIA_SEED_ENABLED=${TIER_CRITERIA_SEED_ENABLED:false}
BENEFIT_CONFIGURATION_SEED_ENABLED=${BENEFIT_CONFIGURATION_SEED_ENABLED:false}
USER_MEMBERSHIP_SEED_ENABLED=${USER_MEMBERSHIP_SEED_ENABLED:false}
PAYMENT_INTENT_SEED_ENABLED=${PAYMENT_INTENT_SEED_ENABLED:false}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.access-expiry-minutes=${ACCESS_TOKEN_EXPIRY_MINUTES:300}
jwt.refresh-expiry-days=${REFRESH_TOKEN_EXPIRY_DAYS:30}


